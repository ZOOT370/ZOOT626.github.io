<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek 测试</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .user { text-align: right; color: blue; margin: 5px 0; }
        .ai { text-align: left; color: green; margin: 5px 0; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>DeepSeek 测试</h1>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入消息...">
        <button id="send-btn">发送</button>
    </div>

    <script>
        console.log("=== 页面加载了 ===");
        
        const API_KEY = 'sk-e6ef13c762094fc2aee6b7cc1643ca1d';
        
        document.getElementById('send-btn').onclick = function() {
            console.log("按钮被点击了");
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;
            
            // 显示用户消息
            const messagesDiv = document.getElementById('messages');
            const userDiv = document.createElement('div');
            userDiv.className = 'user';
            userDiv.textContent = '我: ' + msg;
            messagesDiv.appendChild(userDiv);
            input.value = '';
            
            // 显示加载中
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'ai';
            loadingDiv.textContent = 'AI: 思考中...';
            messagesDiv.appendChild(loadingDiv);
            
            // 调用 API
            fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + API_KEY
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [{ role: 'user', content: msg }],
                    max_tokens: 500
                })
            })
            .then(res => res.json())
            .then(data => {
                loadingDiv.textContent = 'AI: ' + (data.choices?.[0]?.message?.content || '无回复');
                console.log("API返回:", data);
            })
            .catch(err => {
                loadingDiv.textContent = 'AI: 错误 - ' + err.message;
                console.error("错误:", err);
            });
        };
        
        console.log("按钮绑定完成");
    </script>
</body>
</html>
