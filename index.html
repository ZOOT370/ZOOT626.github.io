<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek AI 助手 - 完整版</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #1e293b;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            border-right: 1px solid #334155;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
        }
        .new-session-btn {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .new-session-btn:active {
            transform: scale(0.98);
            background: #2563eb;
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .session-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #334155;
        }
        .session-item.active {
            background: #3b82f6;
        }
        .session-title {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .delete-session-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        .session-actions {
            display: flex;
            gap: 8px;
        }
        .action-icon {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .message {
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 80%;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
            position: relative;
        }
        .user-message {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background: white;
            border: 1px solid #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #0f172a;
        }
        .message-actions {
            position: absolute;
            bottom: -30px;
            right: 0;
            display: none;
            gap: 6px;
            background: white;
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .message:hover .message-actions {
            display: flex;
        }
        .msg-action-btn {
            background: none;
            border: none;
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 16px;
            cursor: pointer;
            color: #64748b;
        }
        .msg-action-btn:hover {
            background: #f1f5f9;
        }
        .loading {
            font-style: italic;
            color: #64748b;
            background: #f1f5f9;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            background: white;
        }
        #user-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        #user-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        #send-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 1000;
            animation: fadeOut 1.5s ease;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @media (max-width: 640px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 1000;
                transform: translateX(-100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: block;
            }
            .message {
                max-width: 90%;
            }
            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .overlay.open {
                display: block;
            }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-session-btn" id="new-session-btn">➕ 新建对话</button>
    </div>
    <div class="sessions-list" id="sessions-list"></div>
</div>

<div class="main-chat">
    <div class="chat-header">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <h1 id="current-session-title">新对话</h1>
        <div class="session-actions">
            <button class="action-icon" id="clear-messages-btn" title="清空当前对话">🗑️</button>
        </div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." autocomplete="off">
        <button id="send-btn">发送</button>
    </div>
</div>

<script>
    const DEEPSEEK_API_KEY = 'sk-ed5a91471a5c488698480a4fa2003237';
    const API_URL = 'https://api.deepseek.com/chat/completions';

    let sessions = {};
    let currentSessionId = null;

    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const sessionsList = document.getElementById('sessions-list');
    const newSessionBtn = document.getElementById('new-session-btn');
    const clearMessagesBtn = document.getElementById('clear-messages-btn');
    const menuToggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const currentSessionTitle = document.getElementById('current-session-title');

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    // 滚动到指定消息（让该消息显示在顶部）
    function scrollToMessageTop(messageElement) {
        if (messageElement) {
            const container = messagesContainer;
            const elementTop = messageElement.offsetTop;
            container.scrollTo({
                top: elementTop - 20,
                behavior: 'smooth'
            });
        }
    }

    function loadData() {
        const saved = localStorage.getItem('deepseek_sessions_v2');
        if (saved) {
            sessions = JSON.parse(saved);
        }
        if (Object.keys(sessions).length === 0) {
            const id = Date.now().toString();
            sessions[id] = {
                id: id,
                title: '新对话',
                messages: [{ role: 'assistant', content: '你好！我是 DeepSeek AI 助手，有什么可以帮你的吗？' }],
                createdAt: id
            };
            currentSessionId = id;
        } else {
            const lastUsed = localStorage.getItem('current_session_id_v2');
            if (lastUsed && sessions[lastUsed]) {
                currentSessionId = lastUsed;
            } else {
                currentSessionId = Object.keys(sessions)[0];
            }
        }
        saveData();
    }

    function saveData() {
        localStorage.setItem('deepseek_sessions_v2', JSON.stringify(sessions));
        if (currentSessionId) {
            localStorage.setItem('current_session_id_v2', currentSessionId);
        }
    }

    function updateSessionTitle(sessionId) {
        const session = sessions[sessionId];
        if (!session) return;
        const firstUserMsg = session.messages.find(m => m.role === 'user');
        if (firstUserMsg) {
            let title = firstUserMsg.content.slice(0, 20);
            if (firstUserMsg.content.length > 20) title += '...';
            session.title = title;
        } else {
            session.title = '新对话';
        }
        renderSessionsList();
        if (currentSessionId === sessionId) {
            currentSessionTitle.textContent = session.title;
        }
        saveData();
    }

    function renderSessionsList() {
        const sorted = Object.values(sessions).sort((a, b) => b.createdAt - a.createdAt);
        sessionsList.innerHTML = '';
        sorted.forEach(session => {
            const div = document.createElement('div');
            div.className = 'session-item';
            if (session.id === currentSessionId) div.classList.add('active');
            div.innerHTML = `
                <span class="session-title">${escapeHtml(session.title)}</span>
                <button class="delete-session-btn" data-id="${session.id}">🗑️</button>
            `;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-session-btn')) return;
                switchSession(session.id);
            });
            const delBtn = div.querySelector('.delete-session-btn');
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSession(session.id);
            });
            sessionsList.appendChild(div);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function switchSession(sessionId) {
        if (!sessions[sessionId]) return;
        currentSessionId = sessionId;
        renderMessages();
        renderSessionsList();
        currentSessionTitle.textContent = sessions[sessionId].title;
        saveData();
        if (window.innerWidth <= 640) {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        }
    }

    function deleteSession(sessionId) {
        if (Object.keys(sessions).length === 1) {
            showToast('至少保留一个对话');
            return;
        }
        delete sessions[sessionId];
        if (currentSessionId === sessionId) {
            currentSessionId = Object.keys(sessions)[0];
            renderMessages();
        }
        renderSessionsList();
        currentSessionTitle.textContent = sessions[currentSessionId].title;
        saveData();
    }

    function newSession() {
        const id = Date.now().toString();
        sessions[id] = {
            id: id,
            title: '新对话',
            messages: [{ role: 'assistant', content: '你好！我是 DeepSeek AI 助手，有什么可以帮你的吗？' }],
            createdAt: id
        };
        currentSessionId = id;
        renderMessages();
        renderSessionsList();
        currentSessionTitle.textContent = '新对话';
        saveData();
        if (window.innerWidth <= 640) {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        }
    }

    function clearCurrentMessages() {
        const session = sessions[currentSessionId];
        if (session) {
            session.messages = [{ role: 'assistant', content: '你好！我是 DeepSeek AI 助手，有什么可以帮你的吗？' }];
            renderMessages();
            updateSessionTitle(currentSessionId);
            saveData();
        }
    }

    function editMessage(index, oldContent) {
        const session = sessions[currentSessionId];
        if (!session) return;
        
        const newContent = prompt('编辑你的消息:', oldContent);
        if (newContent && newContent.trim()) {
            session.messages[index].content = newContent.trim();
            session.messages = session.messages.slice(0, index + 1);
            renderMessages();
            updateSessionTitle(currentSessionId);
            saveData();
            sendEditedMessage(newContent.trim());
        }
    }

    async function sendEditedMessage(question) {
        showLoading();
        sendBtn.disabled = true;
        userInput.disabled = true;
        
        const reply = await callDeepSeekAPI(question);
        
        hideLoading();
        const newMsg = addMessage(reply, 'assistant');
        sendBtn.disabled = false;
        userInput.disabled = false;
    }

    async function regenerateMessage(userMsgIndex, aiMsgIndex) {
        const session = sessions[currentSessionId];
        if (!session) return;
        
        const userMsg = session.messages[userMsgIndex];
        if (!userMsg || userMsg.role !== 'user') return;
        
        session.messages.splice(aiMsgIndex, 1);
        renderMessages();
        
        showLoading();
        const reply = await callDeepSeekAPI(userMsg.content);
        hideLoading();
        addMessage(reply, 'assistant');
    }

    function copyMessage(content) {
        navigator.clipboard.writeText(content);
        showToast('已复制到剪贴板');
    }

    function renderMessages() {
        const session = sessions[currentSessionId];
        if (!session) return;
        messagesContainer.innerHTML = '';
        
        session.messages.forEach((msg, idx) => {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(msg.role === 'user' ? 'user-message' : 'ai-message');
            messageDiv.textContent = msg.content;
            
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-actions';
            
            const copyBtn = document.createElement('button');
            copyBtn.textContent = '📋';
            copyBtn.className = 'msg-action-btn';
            copyBtn.title = '复制';
            copyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                copyMessage(msg.content);
            });
            actionsDiv.appendChild(copyBtn);
            
            if (msg.role === 'user') {
                const editBtn = document.createElement('button');
                editBtn.textContent = '✏️';
                editBtn.className = 'msg-action-btn';
                editBtn.title = '编辑';
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    editMessage(idx, msg.content);
                });
                actionsDiv.appendChild(editBtn);
            } else if (msg.role === 'assistant') {
                let userMsgIndex = -1;
                for (let i = idx - 1; i >= 0; i--) {
                    if (session.messages[i].role === 'user') {
                        userMsgIndex = i;
                        break;
                    }
                }
                if (userMsgIndex !== -1) {
                    const regenBtn = document.createElement('button');
                    regenBtn.textContent = '🔄';
                    regenBtn.className = 'msg-action-btn';
                    regenBtn.title = '重新生成';
                    regenBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        regenerateMessage(userMsgIndex, idx);
                    });
                    actionsDiv.appendChild(regenBtn);
                }
            }
            
            messageDiv.appendChild(actionsDiv);
            messagesContainer.appendChild(messageDiv);
        });
    }

    function addMessage(content, role) {
        const session = sessions[currentSessionId];
        if (session) {
            session.messages.push({ role: role, content: content });
            renderMessages();
            
            // 获取新添加的消息元素并滚动到其顶部
            setTimeout(() => {
                const messages = document.querySelectorAll('.message');
                const lastMessage = messages[messages.length - 1];
                if (lastMessage) {
                    const container = messagesContainer;
                    const elementTop = lastMessage.offsetTop;
                    container.scrollTo({
                        top: elementTop - 20,
                        behavior: 'smooth'
                    });
                }
            }, 50);
            
            if (role === 'user') {
                updateSessionTitle(currentSessionId);
            }
            saveData();
        }
    }

    let isLoading = false;
    function showLoading() {
        isLoading = true;
        const session = sessions[currentSessionId];
        if (session) {
            session.messages.push({ role: 'assistant', content: '🤔 思考中...', isLoading: true });
            renderMessages();
            // 滚动到加载消息
            setTimeout(() => {
                const messages = document.querySelectorAll('.message');
                const lastMessage = messages[messages.length - 1];
                if (lastMessage) {
                    const container = messagesContainer;
                    const elementTop = lastMessage.offsetTop;
                    container.scrollTo({
                        top: elementTop - 20,
                        behavior: 'smooth'
                    });
                }
            }, 50);
        }
    }

    function hideLoading() {
        isLoading = false;
        const session = sessions[currentSessionId];
        if (session && session.messages[session.messages.length - 1]?.isLoading) {
            session.messages.pop();
            renderMessages();
        }
    }

    async function callDeepSeekAPI(userQuestion) {
        const session = sessions[currentSessionId];
        const history = session.messages
            .filter(m => !m.isLoading && m.role !== 'system')
            .map(m => ({ role: m.role, content: m.content }));
        
        const messages = [{ role: 'system', content: 'You are a helpful assistant.' }, ...history];
        
        const payload = {
            model: "deepseek-chat",
            messages: messages,
            stream: false,
            temperature: 0.7,
            max_tokens: 2000
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        } catch (error) {
            console.error('调用 DeepSeek 出错:', error);
            return `❌ 出错了: ${error.message}`;
        }
    }

    async function handleSend() {
        if (isLoading) return;
        const question = userInput.value.trim();
        if (!question) return;

        userInput.value = '';
        addMessage(question, 'user');
        showLoading();
        sendBtn.disabled = true;
        userInput.disabled = true;

        const reply = await callDeepSeekAPI(question);
        
        hideLoading();
        addMessage(reply, 'assistant');
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendBtn.disabled && !isLoading) {
            handleSend();
        }
    });
    newSessionBtn.addEventListener('click', newSession);
    clearMessagesBtn.addEventListener('click', clearCurrentMessages);
    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
    });
    overlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
    });

    loadData();
    renderSessionsList();
    renderMessages();
    currentSessionTitle.textContent = sessions[currentSessionId]?.title || '新对话';
</script>
</body>
</html>
