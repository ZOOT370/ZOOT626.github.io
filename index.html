<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek · 多会话无上限版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* 侧边栏 - 会话列表 */
        .sidebar {
            width: 280px;
            background: #1e293b;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            border-right: 1px solid #334155;
            z-index: 10;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
        }
        .new-session-btn {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .search-box {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }
        .sync-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .session-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #334155;
        }
        .session-item.active {
            background: #3b82f6;
        }
        .session-title {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .delete-session-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
        }
        /* 主聊天区域 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        .cost-badge {
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #475569;
        }
        .session-actions {
            display: flex;
            gap: 8px;
        }
        .action-icon {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .user-wrapper {
            align-self: flex-end;
        }
        .ai-wrapper {
            align-self: flex-start;
        }
        .message {
            padding: 10px 16px;
            border-radius: 20px;
            line-height: 1.45;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .user-message {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            color: #0f172a;
        }
        .timestamp {
            font-size: 0.65rem;
            color: #94a3b8;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            background: white;
        }
        #user-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        #user-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        #send-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 5;
        }
        @media (max-width: 640px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 20;
                transform: translateX(-100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: block;
            }
            .message-wrapper { max-width: 90%; }
            .overlay.open {
                display: block;
            }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-session-btn" id="new-session-btn">➕ 新建对话</button>
        <input type="text" class="search-box" id="search-input" placeholder="🔍 搜索消息...">
        <div class="sync-option">
            <input type="checkbox" id="sync-toggle" checked>
            <label>跨设备同步（关闭后各设备独立）</label>
        </div>
    </div>
    <div class="sessions-list" id="sessions-list"></div>
</div>

<div class="main-chat">
    <div class="chat-header">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <h1 id="current-session-title">新对话</h1>
        <div class="cost-badge" id="cost-badge">💰 本次 0.0000 元</div>
        <div class="session-actions">
            <button class="action-icon" id="search-toggle-btn" title="搜索">🔍</button>
            <button class="action-icon" id="clear-messages-btn" title="清空当前对话">🗑️</button>
        </div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入问题，AI将完整回复（无字数限制）" autocomplete="off">
        <button id="send-btn">发送</button>
    </div>
</div>

<script>
    // ---------- 🔐 安全配置 ----------
    const DEEPSEEK_API_KEY =sk-57d321764a9f486daa8659be78886f3f;   // ⚠️ 必须替换
    const API_URL = 'https://api.deepseek.com/chat/completions';
    const MODEL = 'deepseek-v4-flash';        // 最便宜
    const COOLDOWN_MS = 5000;                 // 5秒冷却
    const DAILY_LIMIT = 50;                   // 每日次数上限
    const INPUT_PRICE = 1.0;   // 元/百万token
    const OUTPUT_PRICE = 2.0;  // 元/百万token
    const MAX_CONTEXT_PAIRS = 8;  // 限制上下文轮数（防止历史过长导致费用暴涨）

    // ---------- 多会话数据结构 ----------
    let sessions = {};
    let currentSessionId = null;
    let currentSessionCost = 0;
    let lastCallTime = 0;
    let todayCallCount = 0;

    // DOM
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const sessionsListDiv = document.getElementById('sessions-list');
    const newSessionBtn = document.getElementById('new-session-btn');
    const clearMsgsBtn = document.getElementById('clear-messages-btn');
    const menuToggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const currentTitle = document.getElementById('current-session-title');
    const costBadge = document.getElementById('cost-badge');
    const searchInput = document.getElementById('search-input');
    const syncToggle = document.getElementById('sync-toggle');

    // 存储key
    let storageKey = () => syncToggle.checked ? 'deepseek_multi_no_limit_sync' : 'deepseek_multi_no_limit_local_' + (navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop');

    // 辅助函数
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function getCurrentTimeStr() {
        const d = new Date();
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function updateCostUI() {
        costBadge.innerText = `💰 本次 ${currentSessionCost.toFixed(5)} 元`;
    }

    function estimateTokens(text) {
        const chinese = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
        const other = text.replace(/[\u4e00-\u9fa5]/g, '').length;
        return Math.ceil(chinese * 1.5 + other * 0.7);
    }

    // ---------- 数据持久化 ----------
    function saveAllSessions() {
        const key = storageKey();
        localStorage.setItem(key, JSON.stringify(sessions));
        if (currentSessionId) {
            localStorage.setItem(key + '_current', currentSessionId);
        }
    }

    function loadAllSessions() {
        const key = storageKey();
        const raw = localStorage.getItem(key);
        if (raw) {
            sessions = JSON.parse(raw);
        }
        if (Object.keys(sessions).length === 0) {
            const id = Date.now().toString();
            sessions[id] = {
                id: id,
                title: '新对话',
                messages: [{ role: 'assistant', content: '你好！我是 DeepSeek 多会话版，无输出上限，每条消息带时间戳。', timestamp: getCurrentTimeStr() }],
                createdAt: id
            };
            currentSessionId = id;
        } else {
            const lastId = localStorage.getItem(key + '_current');
            if (lastId && sessions[lastId]) currentSessionId = lastId;
            else currentSessionId = Object.keys(sessions)[0];
        }
        saveAllSessions();
    }

    function saveCurrentSession() {
        const session = sessions[currentSessionId];
        if (session) {
            // 从DOM重建messages（保留时间戳）
            const wrappers = document.querySelectorAll('#messages .message-wrapper');
            const msgs = [];
            for (let w of wrappers) {
                const bubble = w.querySelector('.message');
                const timeSpan = w.querySelector('.timestamp');
                if (bubble && timeSpan) {
                    const role = bubble.classList.contains('user-message') ? 'user' : 'assistant';
                    msgs.push({
                        role: role,
                        content: bubble.innerText,
                        timestamp: timeSpan.innerText
                    });
                }
            }
            session.messages = msgs;
            // 更新标题（取第一条用户消息）
            const firstUser = msgs.find(m => m.role === 'user');
            if (firstUser) {
                let title = firstUser.content.slice(0, 20);
                if (firstUser.content.length > 20) title += '...';
                session.title = title;
            } else {
                session.title = '新对话';
            }
            saveAllSessions();
        }
    }

    function renderSessionsList() {
        const sorted = Object.values(sessions).sort((a,b) => b.createdAt - a.createdAt);
        sessionsListDiv.innerHTML = '';
        for (let s of sorted) {
            const div = document.createElement('div');
            div.className = 'session-item';
            if (s.id === currentSessionId) div.classList.add('active');
            div.innerHTML = `<span class="session-title">${escapeHtml(s.title)}</span><button class="delete-session-btn" data-id="${s.id}">🗑️</button>`;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-session-btn')) return;
                switchSession(s.id);
            });
            const delBtn = div.querySelector('.delete-session-btn');
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSession(s.id);
            });
            sessionsListDiv.appendChild(div);
        }
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function switchSession(sessionId) {
        if (!sessions[sessionId]) return;
        // 保存当前会话
        saveCurrentSession();
        currentSessionId = sessionId;
        currentSessionCost = 0;
        updateCostUI();
        // 加载会话消息到界面
        const session = sessions[currentSessionId];
        messagesDiv.innerHTML = '';
        for (let msg of session.messages) {
            addMessageToUI(msg.content, msg.role, msg.timestamp, false); // false表示不自动保存（避免循环）
        }
        currentTitle.innerText = session.title;
        renderSessionsList();
        if (window.innerWidth <= 640) {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        }
    }

    function deleteSession(sessionId) {
        if (Object.keys(sessions).length === 1) {
            showToast('至少保留一个对话');
            return;
        }
        delete sessions[sessionId];
        if (currentSessionId === sessionId) {
            currentSessionId = Object.keys(sessions)[0];
            switchSession(currentSessionId);
        } else {
            renderSessionsList();
        }
        saveAllSessions();
    }

    function newSession() {
        saveCurrentSession();
        const id = Date.now().toString();
        sessions[id] = {
            id: id,
            title: '新对话',
            messages: [{ role: 'assistant', content: '你好！我是 DeepSeek 多会话版，无输出上限。', timestamp: getCurrentTimeStr() }],
            createdAt: id
        };
        currentSessionId = id;
        currentSessionCost = 0;
        updateCostUI();
        messagesDiv.innerHTML = '';
        addMessageToUI('你好！我是 DeepSeek 多会话版，无输出上限。', 'assistant', getCurrentTimeStr(), false);
        currentTitle.innerText = '新对话';
        renderSessionsList();
        saveAllSessions();
    }

    function clearCurrentMessages() {
        if (!confirm('清空当前对话的所有消息？')) return;
        const session = sessions[currentSessionId];
        if (session) {
            session.messages = [{ role: 'assistant', content: '对话已清空，开始新话题吧。', timestamp: getCurrentTimeStr() }];
            messagesDiv.innerHTML = '';
            addMessageToUI(session.messages[0].content, 'assistant', session.messages[0].timestamp, false);
            currentSessionCost = 0;
            updateCostUI();
            saveAllSessions();
            renderSessionsList();
        }
    }

    function addMessageToUI(content, role, timestamp, shouldSave = true) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${role === 'user' ? 'user-wrapper' : 'ai-wrapper'}`;
        const bubble = document.createElement('div');
        bubble.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
        bubble.innerText = content;
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        timeSpan.innerText = timestamp;
        wrapper.appendChild(bubble);
        wrapper.appendChild(timeSpan);
        messagesDiv.appendChild(wrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        if (shouldSave) saveCurrentSession();
    }

    let loadingWrapper = null;
    function showLoading() {
        if (loadingWrapper) loadingWrapper.remove();
        loadingWrapper = document.createElement('div');
        loadingWrapper.className = 'message-wrapper ai-wrapper';
        const bubble = document.createElement('div');
        bubble.className = 'message ai-message';
        bubble.innerText = '🤔 思考中...';
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        timeSpan.innerText = getCurrentTimeStr();
        loadingWrapper.appendChild(bubble);
        loadingWrapper.appendChild(timeSpan);
        messagesDiv.appendChild(loadingWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    function hideLoading() {
        if (loadingWrapper) { loadingWrapper.remove(); loadingWrapper = null; }
    }

    async function callDeepSeek(userQuestion) {
        const now = Date.now();
        if (now - lastCallTime < COOLDOWN_MS) {
            throw new Error(`请等待 ${Math.ceil((COOLDOWN_MS - (now - lastCallTime))/1000)} 秒后再发送`);
        }
        const todayKey = `call_limit_${new Date().toISOString().slice(0,10)}`;
        let stored = localStorage.getItem(todayKey);
        todayCallCount = stored ? parseInt(stored,10) : 0;
        if (todayCallCount >= DAILY_LIMIT) {
            throw new Error(`今日已达最大调用次数 ${DAILY_LIMIT} 次，请明天再使用。`);
        }

        // 获取当前会话最近 MAX_CONTEXT_PAIRS 轮消息作为上下文
        const session = sessions[currentSessionId];
        let history = [];
        if (session && session.messages.length > 0) {
            // 取最后 MAX_CONTEXT_PAIRS*2 条消息（用户+AI成对）
            let msgs = session.messages.slice(-MAX_CONTEXT_PAIRS*2);
            for (let m of msgs) {
                if (m.role !== 'system') {
                    history.push({ role: m.role, content: m.content });
                }
            }
        }
        const messages = [
            { role: 'system', content: '你是稳定的助手，请完整回答用户问题，不要截断回复。' },
            ...history
        ];
        const inputText = JSON.stringify(messages);
        const estInputTokens = estimateTokens(inputText);
        const estOutputGuess = 2000; // 预估输出，实际可能更高
        const estCost = (estInputTokens / 1e6 * INPUT_PRICE) + (estOutputGuess / 1e6 * OUTPUT_PRICE);
        if (!confirm(`⚠️ 无输出上限提醒：预估费用约 ${estCost.toFixed(5)} 元（实际取决于AI回复长度）。\n确认发送？`)) {
            throw new Error('用户取消发送');
        }

        lastCallTime = Date.now();
        const payload = {
            model: MODEL,
            messages: messages,
            temperature: 0.7,
            stream: false
        };

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
            },
            body: JSON.stringify(payload)
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API错误(${response.status}): ${errText}`);
        }
        const data = await response.json();
        const reply = data.choices[0].message.content;
        const usedTokens = data.usage?.completion_tokens || estimateTokens(reply);
        const actualCost = (estInputTokens / 1e6 * INPUT_PRICE) + (usedTokens / 1e6 * OUTPUT_PRICE);
        currentSessionCost += actualCost;
        updateCostUI();

        todayCallCount++;
        localStorage.setItem(todayKey, todayCallCount);
        return reply;
    }

    async function handleSend() {
        const question = userInput.value.trim();
        if (!question) return;
        const userTime = getCurrentTimeStr();
        addMessageToUI(question, 'user', userTime, true);
        userInput.value = '';
        sendBtn.disabled = true;
        showLoading();
        try {
            const reply = await callDeepSeek(question);
            hideLoading();
            const aiTime = getCurrentTimeStr();
            addMessageToUI(reply, 'assistant', aiTime, true);
        } catch (err) {
            hideLoading();
            const errTime = getCurrentTimeStr();
            addMessageToUI(`❌ 调用失败: ${err.message}`, 'assistant', errTime, true);
            showToast(err.message);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // 搜索功能简化（跨会话搜索）
    function performSearch() {
        const keyword = searchInput.value.trim().toLowerCase();
        if (!keyword) return;
        let results = [];
        for (let sid in sessions) {
            const s = sessions[sid];
            for (let idx in s.messages) {
                const msg = s.messages[idx];
                if (msg.content.toLowerCase().includes(keyword)) {
                    results.push({ sid: sid, title: s.title, content: msg.content, role: msg.role, timestamp: msg.timestamp });
                }
            }
        }
        if (results.length === 0) {
            showToast('未找到匹配内容');
        } else {
            // 简单展示第一个结果并切换会话
            const first = results[0];
            switchSession(first.sid);
            showToast(`找到 ${results.length} 条结果，已跳转到第一个`);
        }
    }

    // 事件绑定
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    newSessionBtn.addEventListener('click', newSession);
    clearMsgsBtn.addEventListener('click', clearCurrentMessages);
    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
    });
    overlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
    });
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
    document.getElementById('search-toggle-btn').addEventListener('click', () => {
        searchInput.focus();
    });
    syncToggle.addEventListener('change', () => {
        loadAllSessions();
        switchSession(currentSessionId);
        showToast(syncToggle.checked ? '已开启跨设备同步' : '已关闭同步，仅本设备保存');
    });

    // 初始化
    loadAllSessions();
    renderSessionsList();
    switchSession(currentSessionId);
    updateCostUI();

    // 每日次数恢复
    const tdKey = `call_limit_${new Date().toISOString().slice(0,10)}`;
    let storedToday = localStorage.getItem(tdKey);
    if (storedToday) todayCallCount = parseInt(storedToday,10);
    showToast(`今日剩余调用次数：${DAILY_LIMIT - todayCallCount}`);
</script>
</body>
</html>
