<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek AI - 人民币计费</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: white;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-bottom: 0.5px solid #e9ecef;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .navbar h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 30px;
            transition: background 0.2s;
            color: #334155;
        }

        .icon-btn:active {
            background: #f1f5f9;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #ffffff;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 90%;
            animation: fadeIn 0.2s ease;
        }

        .user-message {
            align-self: flex-end;
        }

        .assistant-message {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            word-break: break-word;
            position: relative;
        }

        .user-message .message-bubble {
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .assistant-message .message-bubble {
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 6px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
            font-size: 11px;
            color: #94a3b8;
            margin-left: 12px;
            margin-right: 12px;
            flex-wrap: wrap;
        }

        .message-actions {
            display: flex;
            gap: 8px;
        }

        .msg-action {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            color: #64748b;
            padding: 4px 6px;
            border-radius: 12px;
        }

        .msg-action:active {
            background: #e2e8f0;
        }

        /* 输入区域 */
        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 0.5px solid #e9ecef;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background: #f8fafc;
            border-radius: 28px;
            padding: 8px 16px;
            border: 0.5px solid #e2e8f0;
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
        }

        .send-btn {
            background: #6366f1;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-btn:active {
            opacity: 0.7;
        }

        .send-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: flex-end;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-height: 80%;
            border-radius: 24px 24px 0 0;
            overflow-y: auto;
            padding: 20px;
            animation: slideUp 0.2s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 18px;
        }

        .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid #e9ecef;
        }

        .session-info {
            flex: 1;
            cursor: pointer;
        }

        .session-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .session-date {
            font-size: 11px;
            color: #94a3b8;
        }

        .delete-session {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 20px;
            padding: 8px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
        }

        /* API设置面板 */
        .settings-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }

        .settings-panel.show {
            opacity: 1;
            visibility: visible;
        }

        .settings-card {
            background: white;
            width: 90%;
            max-width: 340px;
            border-radius: 28px;
            padding: 24px;
        }

        .settings-card input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            font-size: 14px;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 28px;
            width: 100%;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        .cost-badge {
            background: #eef2ff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            color: #4f46e5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .edit-input {
            width: 100%;
            background: rgba(0,0,0,0.05);
            border: none;
            padding: 8px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="navbar">
        <h1>DeepSeek AI</h1>
        <div class="nav-buttons">
            <button class="icon-btn" id="newChatBtn" title="新建对话">➕</button>
            <button class="icon-btn" id="sessionsBtn" title="对话历史">📋</button>
            <button class="icon-btn" id="settingsBtn" title="API密钥">⚙️</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">✨ 点击上方➕新建对话</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<!-- 会话列表模态框 -->
<div id="sessionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>历史对话</span>
            <button class="icon-btn" id="closeModalBtn" style="font-size:24px;">✕</button>
        </div>
        <div id="sessionList"></div>
    </div>
</div>

<!-- API设置面板 -->
<div id="settingsModal" class="settings-panel">
    <div class="settings-card">
        <h3 style="margin-bottom:12px;">DeepSeek API Key</h3>
        <input type="password" id="apiKeyInput" placeholder="sk-xxx">
        <button class="btn-primary" id="saveApiKeyBtn">保存</button>
        <p style="font-size:11px; color:#94a3b8; margin-top:12px;">密钥仅存储在您的设备中</p>
    </div>
</div>

<script>
    // ================= 模型和价格配置（人民币）=================
    const MODEL = "deepseek-chat";          // 可改为 deepseek-v4-pro
    const USD_TO_CNY = 7.2;                 // 固定汇率 1美元 = 7.2元人民币
    const PRICE_INPUT_PER_M_USD = 0.14;      // 输入 0.14 USD / 1M tokens
    const PRICE_OUTPUT_PER_M_USD = 0.28;     // 输出 0.28 USD / 1M tokens
    // 转换为人民币每百万tokens
    const PRICE_INPUT_PER_M_CNY = PRICE_INPUT_PER_M_USD * USD_TO_CNY;
    const PRICE_OUTPUT_PER_M_CNY = PRICE_OUTPUT_PER_M_USD * USD_TO_CNY;

    // ---------- 全局状态 ----------
    let sessions = [];           // { id, name, messages, updatedAt }
    let currentSessionId = null;
    let isWaiting = false;       // 等待API响应

    // DOM 元素
    const chatContainer = document.getElementById('chatContainer');
    const emptyStateDiv = document.getElementById('emptyState');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const sessionsBtn = document.getElementById('sessionsBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const sessionModal = document.getElementById('sessionModal');
    const settingsModal = document.getElementById('settingsModal');
    const sessionListDiv = document.getElementById('sessionList');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');

    // ---------- 辅助函数 ----------
    function formatDate(timestamp) {
        const date = new Date(timestamp);
        return `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }

    // 计算费用（人民币）
    function calculateCostCNY(usage) {
        if (!usage) return 0;
        const inputCost = (usage.prompt_tokens / 1_000_000) * PRICE_INPUT_PER_M_CNY;
        const outputCost = (usage.completion_tokens / 1_000_000) * PRICE_OUTPUT_PER_M_CNY;
        return inputCost + outputCost;
    }

    // 保存所有会话到 localStorage
    function saveSessions() {
        localStorage.setItem('deepseek_sessions', JSON.stringify(sessions));
        localStorage.setItem('currentSessionId', currentSessionId);
    }

    // 加载API Key
    function loadApiKey() {
        const key =sk-57d321764a9f486daa8659be78886f3f;
        if (key) apiKeyInput.value = key;
    }

    function saveApiKey(key) {
        localStorage.setItem('deepseek_api_key', key);
    }

    // 加载会话
    function loadSessions() {
        const saved = localStorage.getItem('deepseek_sessions');
        if (saved) {
            sessions = JSON.parse(saved);
        } else {
            const defaultId = Date.now().toString();
            sessions = [{
                id: defaultId,
                name: '新对话',
                messages: [],
                updatedAt: Date.now()
            }];
            currentSessionId = defaultId;
            saveSessions();
        }
        const savedCurrent = localStorage.getItem('currentSessionId');
        if (savedCurrent && sessions.find(s => s.id === savedCurrent)) {
            currentSessionId = savedCurrent;
        } else if (sessions.length > 0 && !currentSessionId) {
            currentSessionId = sessions[0].id;
        }
        renderCurrentChat();
    }

    // 获取当前会话
    function currentSession() {
        return sessions.find(s => s.id === currentSessionId);
    }

    // 重新生成某条助手消息（找到该消息索引，移除它及之后所有消息，重新调用API）
    async function regenerateMessage(assistantIdx) {
        const session = currentSession();
        if (!session) return;
        if (assistantIdx >= session.messages.length) return;
        if (session.messages[assistantIdx].role !== 'assistant') return;

        // 获取这条助手消息之前的最后一条用户消息
        let lastUserMsgIndex = -1;
        for (let i = assistantIdx - 1; i >= 0; i--) {
            if (session.messages[i].role === 'user') {
                lastUserMsgIndex = i;
                break;
            }
        }
        if (lastUserMsgIndex === -1) return;

        const userMsg = session.messages[lastUserMsgIndex];
        // 截断：保留从开头到该用户消息（包括用户消息）
        session.messages = session.messages.slice(0, lastUserMsgIndex + 1);
        saveSessions();
        renderCurrentChat();

        // 重新发送该用户消息
        await sendMessageToAPI(userMsg.content);
    }

    // 修改用户消息并重新发送（弹出修改框）
    async function editUserMessage(msgIndex) {
        const session = currentSession();
        if (!session) return;
        const oldMsg = session.messages[msgIndex];
        if (oldMsg.role !== 'user') return;

        const newContent = prompt("编辑你的消息:", oldMsg.content);
        if (!newContent || newContent.trim() === "") return;

        // 截断到该用户消息之前，然后添加新的用户消息
        session.messages = session.messages.slice(0, msgIndex);
        // 添加修改后的用户消息
        session.messages.push({
            role: 'user',
            content: newContent.trim(),
            timestamp: Date.now()
        });
        saveSessions();
        renderCurrentChat();

        // 发送新的用户消息获取回复
        await sendMessageToAPI(newContent.trim());
    }

    // 修改助手消息内容（直接编辑文本）
    async function editAssistantMessage(msgIndex) {
        const session = currentSession();
        if (!session) return;
        const msg = session.messages[msgIndex];
        if (msg.role !== 'assistant') return;

        const newContent = prompt("编辑助手回复内容:", msg.content);
        if (newContent === null) return;
        // 只更新文本，费用和时间戳保留
        msg.content = newContent.trim();
        msg.timestamp = Date.now(); // 更新时间戳
        saveSessions();
        renderCurrentChat();
    }

    // 发送消息到API并处理响应
    async function sendMessageToAPI(userMessage) {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert("请先设置 DeepSeek API Key（点击右上角⚙️）");
            return false;
        }
        if (isWaiting) {
            alert("请等待上一次回复完成");
            return false;
        }

        const session = currentSession();
        if (!session) return false;

        // 接口请求体
        const messagesForAPI = session.messages.map(m => ({
            role: m.role,
            content: m.content
        }));

        isWaiting = true;
        sendBtn.classList.add('disabled');

        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: messagesForAPI,
                    temperature: 0.7,
                    max_tokens: 2000,
                    stream: false
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API错误 ${response.status}: ${errText}`);
            }

            const data = await response.json();
            const assistantContent = data.choices[0].message.content;
            const usage = data.usage;
            const costCNY = calculateCostCNY(usage);

            // 添加助手回复到当前会话
            session.messages.push({
                role: 'assistant',
                content: assistantContent,
                timestamp: Date.now(),
                cost: costCNY,            // 保存人民币费用
                usage: usage
            });
            session.updatedAt = Date.now();
            // 更新会话名称（使用第一条用户消息）
            if (session.messages.length >= 2 && session.name === '新对话') {
                const firstUserMsg = session.messages.find(m => m.role === 'user');
                if (firstUserMsg) {
                    session.name = firstUserMsg.content.slice(0, 20) + (firstUserMsg.content.length > 20 ? '…' : '');
                }
            }
            saveSessions();
            renderCurrentChat();
            scrollToBottom();
            return true;
        } catch (err) {
            console.error(err);
            alert("请求失败: " + err.message);
            // 可选：添加错误消息
            session.messages.push({
                role: 'assistant',
                content: `❌ 错误: ${err.message}`,
                timestamp: Date.now(),
                cost: 0
            });
            saveSessions();
            renderCurrentChat();
            return false;
        } finally {
            isWaiting = false;
            sendBtn.classList.remove('disabled');
        }
    }

    // 发送新消息（由用户输入触发）
    async function sendMessage() {
        let text = messageInput.value.trim();
        if (!text) return;
        if (isWaiting) {
            alert("等待回复中...");
            return;
        }
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert("请先设置 API Key");
            return;
        }

        let session = currentSession();
        if (!session) {
            // 如果没有会话，自动创建
            createNewSession();
            session = currentSession();
        }

        // 添加用户消息
        session.messages.push({
            role: 'user',
            content: text,
            timestamp: Date.now()
        });
        session.updatedAt = Date.now();
        saveSessions();
        renderCurrentChat();
        messageInput.value = '';
        scrollToBottom();

        // 调用API
        await sendMessageToAPI(text);
    }

    // 新建对话
    function createNewSession() {
        const newId = Date.now().toString();
        const newSession = {
            id: newId,
            name: '新对话',
            messages: [],
            updatedAt: Date.now()
        };
        sessions.unshift(newSession);
        currentSessionId = newId;
        saveSessions();
        renderCurrentChat();
        closeModal();
    }

    // 删除对话（整个会话）
    function deleteSession(sessionId) {
        if (sessions.length === 1) {
            if (confirm("删除最后一个对话会新建一个空对话，确定吗？")) {
                sessions = [];
                createNewSession();
            }
            return;
        }
        sessions = sessions.filter(s => s.id !== sessionId);
        if (currentSessionId === sessionId) {
            currentSessionId = sessions[0].id;
        }
        saveSessions();
        renderCurrentChat();
        renderSessionList(); // 刷新侧边栏
    }

    // 切换对话
    function switchSession(sessionId) {
        currentSessionId = sessionId;
        saveSessions();
        renderCurrentChat();
        closeModal();
    }

    // 渲染聊天界面
    function renderCurrentChat() {
        const session = currentSession();
        if (!session) {
            chatContainer.innerHTML = '<div class="empty-state">点击➕新建对话</div>';
            emptyStateDiv.style.display = 'none';
            return;
        }

        if (session.messages.length === 0) {
            emptyStateDiv.style.display = 'block';
            chatContainer.innerHTML = '<div class="empty-state">✨ 开始和DeepSeek聊天吧</div>';
            return;
        }

        emptyStateDiv.style.display = 'none';
        chatContainer.innerHTML = '';
        session.messages.forEach((msg, idx) => {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${msg.role === 'user' ? 'user-message' : 'assistant-message'}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerText = msg.content;

            const footer = document.createElement('div');
            footer.className = 'message-footer';

            const dateSpan = document.createElement('span');
            dateSpan.innerText = formatDate(msg.timestamp);
            footer.appendChild(dateSpan);

            // 助手消息显示费用（人民币）
            if (msg.role === 'assistant' && msg.cost !== undefined && msg.cost > 0) {
                const costSpan = document.createElement('span');
                costSpan.className = 'cost-badge';
                costSpan.innerText = `¥${msg.cost.toFixed(6)}`;
                footer.appendChild(costSpan);
            }

            // 操作按钮区域
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-actions';

            if (msg.role === 'assistant') {
                const regenBtn = document.createElement('button');
                regenBtn.innerText = '🔄';
                regenBtn.className = 'msg-action';
                regenBtn.title = '重新生成';
                regenBtn.onclick = () => regenerateMessage(idx);

                const editBtn = document.createElement('button');
                editBtn.innerText = '✏️';
                editBtn.className = 'msg-action';
                editBtn.title = '编辑回复';
                editBtn.onclick = () => editAssistantMessage(idx);

                actionsDiv.appendChild(regenBtn);
                actionsDiv.appendChild(editBtn);
            } else if (msg.role === 'user') {
                const editBtn = document.createElement('button');
                editBtn.innerText = '✏️';
                editBtn.className = 'msg-action';
                editBtn.title = '编辑消息并重新提问';
                editBtn.onclick = () => editUserMessage(idx);
                actionsDiv.appendChild(editBtn);
            }

            if (actionsDiv.children.length > 0) {
                footer.appendChild(actionsDiv);
            }

            messageDiv.appendChild(bubble);
            messageDiv.appendChild(footer);
            chatContainer.appendChild(messageDiv);
        });
        scrollToBottom();
    }

    // 渲染会话列表（侧边栏）
    function renderSessionList() {
        if (!sessionListDiv) return;
        if (sessions.length === 0) {
            sessionListDiv.innerHTML = '<div class="empty-state">暂无对话</div>';
            return;
        }
        sessionListDiv.innerHTML = '';
        sessions.forEach(sess => {
            const div = document.createElement('div');
            div.className = 'session-item';
            div.innerHTML = `
                <div class="session-info" data-id="${sess.id}">
                    <div class="session-name">${escapeHtml(sess.name)}</div>
                    <div class="session-date">${formatDate(sess.updatedAt)} · ${sess.messages.length}条消息</div>
                </div>
                <button class="delete-session" data-id="${sess.id}">🗑️</button>
            `;
            div.querySelector('.session-info').addEventListener('click', (e) => {
                e.stopPropagation();
                switchSession(sess.id);
            });
            div.querySelector('.delete-session').addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm(`删除对话“${sess.name}”?`)) {
                    deleteSession(sess.id);
                }
            });
            sessionListDiv.appendChild(div);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 100);
    }

    function closeModal() {
        sessionModal.classList.remove('show');
        settingsModal.classList.remove('show');
    }

    function openSessionModal() {
        renderSessionList();
        sessionModal.classList.add('show');
    }

    // 初始化事件监听
    function init() {
        loadApiKey();
        loadSessions();

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        newChatBtn.addEventListener('click', () => {
            createNewSession();
        });
        sessionsBtn.addEventListener('click', openSessionModal);
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('show');
        });
        closeModalBtn.addEventListener('click', closeModal);
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeModal();
        });
        sessionModal.addEventListener('click', (e) => {
            if (e.target === sessionModal) closeModal();
        });
        saveApiKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                saveApiKey(key);
                alert("API Key已保存");
                closeModal();
            } else {
                alert("请输入有效的API Key");
            }
        });
    }

    init();
</script>
</body>
</html>
