<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：让网页在移动端自适应 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek AI 助手</title>
    <style>
        /* 简单的样式，你可以根据喜好修改 */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #chat-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            padding: 16px;
            margin: 0;
            border-bottom: 1px solid #e9ecef;
            background: white;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafcff;
        }
        .message {
            padding: 12px 16px;
            border-radius: 24px;
            max-width: 85%;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .user-message {
            background: #e9ecef;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            color: #1e2a3e;
        }
        .ai-message {
            background: white;
            border: 1px solid #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            color: #0f172a;
        }
        .loading {
            font-style: italic;
            color: #64748b;
            background: #f1f5f9;
        }
        .input-area {
            padding: 16px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 12px;
            background: white;
        }
        #user-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }
        #user-input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.96);
            background: #005fc1;
        }
        button:disabled {
            background: #a0c4ff;
            cursor: not-allowed;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .message { max-width: 90%; }
            button { padding: 0 20px; }
        }
    </style>
</head>
<body>

<div id="chat-container">
    <h1>🤖 DeepSeek 助手</h1>
    <div id="messages">
        <div class="message ai-message">你好！我是 DeepSeek AI 助手，有什么可以帮你的吗？</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." autocomplete="off">
        <button id="send-btn">发送</button>
    </div>
</div>

<script>
    // ======================== 已替换为您的 API Key ========================
    const DEEPSEEK_API_KEY = 'sk-ed5a91471a5c488698480a4fa2003237';   // <--- 已替换
    // ===========================================================================

    const API_URL = 'https://api.deepseek.com/chat/completions';

    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // 记录对话历史
    let conversationHistory = [
        { role: "system", content: "You are a helpful assistant." }
    ];

    // 添加消息到界面
    function addMessage(content, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
        messageDiv.textContent = content;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        return messageDiv;
    }

    // 显示“正在思考...”的临时消息
    let loadingMessage = null;
    function showLoading() {
        if (loadingMessage) loadingMessage.remove();
        loadingMessage = document.createElement('div');
        loadingMessage.classList.add('message', 'ai-message', 'loading');
        loadingMessage.textContent = '🤔 思考中...';
        messagesContainer.appendChild(loadingMessage);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function hideLoading() {
        if (loadingMessage) {
            loadingMessage.remove();
            loadingMessage = null;
        }
    }

    // 调用 DeepSeek API
    async function callDeepSeekAPI(userQuestion) {
        // 添加用户消息到历史
        conversationHistory.push({ role: "user", content: userQuestion });

        // 构造请求体
        const payload = {
            model: "deepseek-chat",   // 推荐使用 deepseek-chat 模型
            messages: conversationHistory,
            stream: false,            // 非流式响应，简单易用
            temperature: 0.7,
            max_tokens: 2000
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
            }

            const data = await response.json();
            // 提取 AI 回复内容
            const assistantReply = data.choices[0].message.content;
            // 将 AI 回复添加到历史
            conversationHistory.push({ role: "assistant", content: assistantReply });
            return assistantReply;

        } catch (error) {
            console.error('调用 DeepSeek 出错:', error);
            return `❌ 出错了: ${error.message}。请检查 API Key 或网络。`;
        }
    }

    // 处理发送消息
    async function handleSend() {
        const question = userInput.value.trim();
        if (!question) return;

        // 清空输入框
        userInput.value = '';
        // 显示用户消息
        addMessage(question, 'user');
        // 显示加载状态
        showLoading();
        // 禁用按钮避免重复请求
        sendBtn.disabled = true;
        userInput.disabled = true;

        // 调用 API
        const reply = await callDeepSeekAPI(question);

        // 隐藏加载状态
        hideLoading();
        // 显示 AI 回复
        addMessage(reply, 'ai');
        // 恢复输入
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
    }

    // 绑定事件
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendBtn.disabled) {
            handleSend();
        }
    });
</script>
</body>
</html>
