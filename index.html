<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek 智能助理 · 时间胶囊</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 (会话管理) */
        .sidebar {
            width: 280px;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: transform 0.25s ease;
            border-right: 1px solid #1e293b;
            z-index: 20;
        }

        .sidebar-header {
            padding: 18px 16px;
            border-bottom: 1px solid #1e293b;
        }

        .new-session-btn {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-session-btn:active {
            transform: scale(0.97);
            background: #2563eb;
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .session-item {
            padding: 12px 14px;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
        }

        .session-item.active {
            background: #3b82f6;
        }

        .session-title {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-session-btn {
            background: rgba(0,0,0,0.3);
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 30px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主聊天区 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .chat-header {
            background: white;
            padding: 14px 20px;
            border-bottom: 1px solid #e9eef3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 4px 10px;
        }

        #current-session-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .session-actions {
            display: flex;
            gap: 10px;
        }

        .action-icon {
            background: #f1f5f9;
            border: none;
            font-size: 1.2rem;
            border-radius: 30px;
            padding: 6px 12px;
            cursor: pointer;
        }

        /* 消息区域 */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        /* 消息卡片 */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            position: relative;
        }

        .user-wrapper {
            align-self: flex-end;
        }

        .ai-wrapper {
            align-self: flex-start;
        }

        .message {
            padding: 12px 18px;
            border-radius: 26px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
            position: relative;
            transition: all 0.1s;
        }

        .user-message {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .ai-message {
            background: #f1f5f9;
            color: #0f172a;
            border-bottom-left-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 6px;
            margin-left: 12px;
            margin-right: 12px;
            color: #94a3b8;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .user-wrapper .message-time {
            justify-content: flex-end;
        }

        /* 悬浮操作栏 */
        .msg-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            justify-content: flex-end;
            opacity: 0;
            transition: 0.1s;
        }

        .message-wrapper:hover .msg-actions {
            opacity: 1;
        }

        .msg-btn {
            background: #eef2ff;
            border: none;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: #1e293b;
            backdrop-filter: blur(4px);
        }

        .loading-bubble {
            background: #f1f5f9;
            padding: 12px 18px;
            border-radius: 26px;
            color: #475569;
            font-style: italic;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* 底部输入 */
        .input-area {
            padding: 16px 20px 24px;
            border-top: 1px solid #eef2ff;
            background: white;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #cbd5e6;
            border-radius: 48px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
            background: #ffffff;
        }

        #user-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        #send-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 48px;
            padding: 12px 28px;
            font-weight: 600;
            cursor: pointer;
        }

        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            pointer-events: none;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; visibility: hidden; }
        }

        /* 编辑模式 */
        .edit-textarea {
            width: 100%;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid #3b82f6;
            background: white;
            resize: vertical;
        }

        @media (max-width: 640px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                width: 260px;
                z-index: 200;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: block;
            }
            .message-wrapper {
                max-width: 92%;
            }
            .overlay-mobile {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.4);
                z-index: 150;
            }
            .overlay-mobile.open {
                display: block;
            }
        }
    </style>
</head>
<body>
<div class="overlay-mobile" id="mobileOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-session-btn" id="newSessionBtn">✨ 新对话</button>
    </div>
    <div class="sessions-list" id="sessionsList"></div>
</div>

<div class="main-chat">
    <div class="chat-header">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div id="current-session-title">对话空间</div>
        <div class="session-actions">
            <button class="action-icon" id="clearCurrentChatBtn" title="清空当前对话">🧹</button>
        </div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入消息… （支持修改指令）" autocomplete="off">
        <button id="send-btn">发送</button>
    </div>
</div>

<script>
    // =============================================
    // 🔐 API KEY 请在这里替换（我已经留空，您自行填写）
    // =============================================
    const DEEPSEEK_API_KEY =sk-5359398f9cb344919b03c3184a633685 '请在此处填入您的DeepSeek API Key';   // <--- 手动替换即可
    const API_URL = 'https://api.deepseek.com/chat/completions';

    // ---------- 全局数据结构 ----------
    let sessions = {};          // 会话库 { sessionId: { id, title, messages, createdAt } }
    let currentSessionId = null;
    let isLoadingFlag = false;   // 防止并发请求

    // DOM 元素
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const sessionsListDiv = document.getElementById('sessionsList');
    const newSessionBtn = document.getElementById('newSessionBtn');
    const clearChatBtn = document.getElementById('clearCurrentChatBtn');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const currentTitleSpan = document.getElementById('current-session-title');

    // ---------- 辅助函数 ----------
    function showToast(text) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = text;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // 获取当前时间字符串 (小时:分钟)
    function getTimeLabel() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    // 保存全部数据到 localStorage
    function persistAll() {
        localStorage.setItem('deepseek_sessions_master', JSON.stringify(sessions));
        if (currentSessionId) {
            localStorage.setItem('deepseek_current_id', currentSessionId);
        }
    }

    // 加载本地数据
    function loadData() {
        const raw = localStorage.getItem('deepseek_sessions_master');
        if (raw) {
            sessions = JSON.parse(raw);
        }
        if (Object.keys(sessions).length === 0) {
            const newId = Date.now().toString();
            sessions[newId] = {
                id: newId,
                title: '新对话',
                messages: [{ role: 'assistant', content: '你好！我是 DeepSeek 助手✨\n每条消息都会记录时间，你可以修改已发送的指令，AI 回复后自动跳转到该回复顶部。', timestamp: getTimeLabel() }],
                createdAt: newId
            };
            currentSessionId = newId;
        } else {
            const lastId = localStorage.getItem('deepseek_current_id');
            if (lastId && sessions[lastId]) {
                currentSessionId = lastId;
            } else {
                currentSessionId = Object.keys(sessions)[0];
            }
        }
        persistAll();
    }

    // 更新会话标题（根据第一条用户消息）
    function updateSessionTitleFromMessages(sessionId) {
        const sess = sessions[sessionId];
        if (!sess) return;
        const firstUserMsg = sess.messages.find(m => m.role === 'user');
        if (firstUserMsg && firstUserMsg.content) {
            let title = firstUserMsg.content.slice(0, 22);
            if (firstUserMsg.content.length > 22) title += '…';
            sess.title = title;
        } else {
            sess.title = '新对话';
        }
        renderSidebar();
        if (sessionId === currentSessionId) {
            currentTitleSpan.innerText = sess.title;
        }
        persistAll();
    }

    // 渲染侧边栏
    function renderSidebar() {
        const sorted = Object.values(sessions).sort((a,b) => b.createdAt - a.createdAt);
        sessionsListDiv.innerHTML = '';
        for (const sess of sorted) {
            const div = document.createElement('div');
            div.className = 'session-item';
            if (sess.id === currentSessionId) div.classList.add('active');
            div.innerHTML = `
                <span class="session-title">${escapeHtml(sess.title)}</span>
                <button class="delete-session-btn" data-id="${sess.id}">🗑️</button>
            `;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-session-btn')) return;
                switchToSession(sess.id);
            });
            const delBtn = div.querySelector('.delete-session-btn');
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSessionById(sess.id);
            });
            sessionsListDiv.appendChild(div);
        }
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function deleteSessionById(sid) {
        if (Object.keys(sessions).length === 1) {
            showToast('至少保留一个对话');
            return;
        }
        delete sessions[sid];
        if (currentSessionId === sid) {
            currentSessionId = Object.keys(sessions)[0];
            renderMessagesThread();
        }
        renderSidebar();
        const newTitle = sessions[currentSessionId]?.title || '对话';
        currentTitleSpan.innerText = newTitle;
        persistAll();
    }

    function switchToSession(sid) {
        if (!sessions[sid]) return;
        currentSessionId = sid;
        renderMessagesThread();
        renderSidebar();
        currentTitleSpan.innerText = sessions[sid].title;
        persistAll();
        if (window.innerWidth <= 640) {
            sidebar.classList.remove('open');
            mobileOverlay.classList.remove('open');
        }
    }

    function clearCurrentSession() {
        const sess = sessions[currentSessionId];
        if (sess) {
            sess.messages = [{ role: 'assistant', content: '对话已清空，随时提问～', timestamp: getTimeLabel() }];
            renderMessagesThread();
            updateSessionTitleFromMessages(currentSessionId);
            showToast('当前对话已清空');
        }
    }

    function newEmptySession() {
        const newId = Date.now().toString();
        sessions[newId] = {
            id: newId,
            title: '新对话',
            messages: [{ role: 'assistant', content: '你好！我是 DeepSeek 助手，消息带时间戳，支持修改指令。', timestamp: getTimeLabel() }],
            createdAt: newId
        };
        currentSessionId = newId;
        renderMessagesThread();
        renderSidebar();
        currentTitleSpan.innerText = '新对话';
        persistAll();
        if (window.innerWidth <= 640) {
            sidebar.classList.remove('open');
            mobileOverlay.classList.remove('open');
        }
    }

    // 核心: 渲染消息区域，并且每条消息带时间和操作按钮
    function renderMessagesThread() {
        const sess = sessions[currentSessionId];
        if (!sess) return;
        messagesDiv.innerHTML = '';
        const messageList = sess.messages;

        for (let idx = 0; idx < messageList.length; idx++) {
            const msg = messageList[idx];
            const isUser = msg.role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isUser ? 'user-wrapper' : 'ai-wrapper'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            bubble.innerText = msg.content;
            
            // 时间与操作栏
            const timeRow = document.createElement('div');
            timeRow.className = 'message-time';
            const timeSpan = document.createElement('span');
            timeSpan.innerText = msg.timestamp || getTimeLabel();
            timeRow.appendChild(timeSpan);
            
            // 操作按钮组 (编辑 / 复制 / 重新生成)
            const actionDiv = document.createElement('div');
            actionDiv.className = 'msg-actions';
            
            // 复制按钮 (通用)
            const copyBtn = document.createElement('button');
            copyBtn.innerText = '📋 复制';
            copyBtn.className = 'msg-btn';
            copyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(msg.content);
                showToast('内容已复制');
            });
            actionDiv.appendChild(copyBtn);
            
            if (isUser) {
                // 编辑指令按钮 (修改发出的消息)
                const editBtn = document.createElement('button');
                editBtn.innerText = '✏️ 修改指令';
                editBtn.className = 'msg-btn';
                editBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (isLoadingFlag) {
                        showToast('等待AI回复完成后再修改');
                        return;
                    }
                    // 弹出可修改区域
                    const newContent = prompt('编辑你的消息 (修改后将重新生成回复)', msg.content);
                    if (newContent && newContent.trim() !== '') {
                        const trimmed = newContent.trim();
                        // 1. 替换本条用户消息内容
                        msg.content = trimmed;
                        msg.timestamp = getTimeLabel();  // 更新时间
                        // 2. 删除该用户消息之后的所有消息 (保留之前的上下文)
                        const currentMsgList = sessions[currentSessionId].messages;
                        const targetIndex = currentMsgList.findIndex(m => m === msg);
                        if (targetIndex !== -1 && targetIndex + 1 < currentMsgList.length) {
                            sessions[currentSessionId].messages = currentMsgList.slice(0, targetIndex + 1);
                        }
                        renderMessagesThread();
                        updateSessionTitleFromMessages(currentSessionId);
                        persistAll();
                        // 3. 自动重新请求AI回复
                        await requestAIResponseForCurrentLastUser();
                    }
                });
                actionDiv.appendChild(editBtn);
            } else {
                // AI消息: 重新生成(基于其上一条用户消息)
                const regenBtn = document.createElement('button');
                regenBtn.innerText = '🔄 重新生成';
                regenBtn.className = 'msg-btn';
                regenBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (isLoadingFlag) {
                        showToast('请等待当前回复完成');
                        return;
                    }
                    // 找到这条AI消息的上一条用户消息
                    const sessNow = sessions[currentSessionId];
                    const aiIndex = sessNow.messages.findIndex(m => m === msg);
                    if (aiIndex > 0) {
                        let userMsgObj = null;
                        for (let i = aiIndex-1; i >= 0; i--) {
                            if (sessNow.messages[i].role === 'user') {
                                userMsgObj = sessNow.messages[i];
                                break;
                            }
                        }
                        if (userMsgObj) {
                            // 删除当前AI及之后所有消息
                            sessNow.messages = sessNow.messages.slice(0, aiIndex);
                            renderMessagesThread();
                            // 重新请求
                            await requestAIWithUserMessage(userMsgObj.content);
                        } else {
                            showToast('无法重新生成, 缺少用户消息');
                        }
                    } else {
                        showToast('无法重新生成');
                    }
                });
                actionDiv.appendChild(regenBtn);
            }
            
            wrapper.appendChild(bubble);
            wrapper.appendChild(timeRow);
            wrapper.appendChild(actionDiv);
            messagesDiv.appendChild(wrapper);
        }
        
        // 滚动到底部前先自动滚动到最新AI回复的顶部 (如果最新一条是AI就定位到该消息顶部)
        if (messageList.length > 0) {
            const lastMsgIndex = messageList.length - 1;
            const lastMsgType = messageList[lastMsgIndex].role;
            // 如果最后一条是assistant，则滚动到该消息的可见区域顶部
            if (lastMsgType === 'assistant') {
                const wrappers = messagesDiv.querySelectorAll('.message-wrapper');
                if (wrappers[lastMsgIndex]) {
                    wrappers[lastMsgIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            } else {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        } else {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }
    
    // 发送消息并请求AI (普通发送)
    async function sendUserMessage(text) {
        if (isLoadingFlag) {
            showToast('正在回复中，稍后再试');
            return;
        }
        const question = text.trim();
        if (!question) return;
        
        const sess = sessions[currentSessionId];
        // 添加用户消息（带时间）
        sess.messages.push({ role: 'user', content: question, timestamp: getTimeLabel() });
        renderMessagesThread();
        updateSessionTitleFromMessages(currentSessionId);
        persistAll();
        
        // 请求AI
        await requestAIResponseForCurrentLastUser();
    }
    
    // 根据最后一条用户消息请求AI (不额外添加)
    async function requestAIResponseForCurrentLastUser() {
        const sess = sessions[currentSessionId];
        const lastMsg = sess.messages[sess.messages.length - 1];
        if (!lastMsg || lastMsg.role !== 'user') return;
        await requestAIWithUserMessage(lastMsg.content);
    }
    
    async function requestAIWithUserMessage(userQuestion) {
        if (isLoadingFlag) return;
        isLoadingFlag = true;
        sendBtn.disabled = true;
        userInput.disabled = true;
        
        // 显示loading占位符 (临时)
        const sess = sessions[currentSessionId];
        const loadingPlaceholder = { role: 'assistant', content: '🤔 思考中...', timestamp: getTimeLabel(), isLoading: true };
        sess.messages.push(loadingPlaceholder);
        renderMessagesThread();
        
        // 构建 API 历史 (过滤掉 loading 标记)
        const historyMsgs = sess.messages.filter(m => !m.isLoading).map(m => ({
            role: m.role,
            content: m.content
        }));
        // system 提示
        const messagesForAPI = [{ role: 'system', content: 'You are a helpful assistant. 请用中文友好回复。' }, ...historyMsgs];
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messagesForAPI,
                    stream: false,
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });
            
            if (!response.ok) {
                let errDetail = await response.text();
                throw new Error(`API错误 ${response.status}: ${errDetail}`);
            }
            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            
            // 替换 loading 消息
            const idxLoading = sess.messages.findIndex(m => m.isLoading === true);
            if (idxLoading !== -1) {
                sess.messages.splice(idxLoading, 1, { role: 'assistant', content: aiReply, timestamp: getTimeLabel() });
            } else {
                sess.messages.push({ role: 'assistant', content: aiReply, timestamp: getTimeLabel() });
            }
            renderMessagesThread();
            updateSessionTitleFromMessages(currentSessionId);
            persistAll();
        } catch (err) {
            console.error(err);
            // 移除loading并显示错误消息
            const idxErr = sess.messages.findIndex(m => m.isLoading === true);
            if (idxErr !== -1) {
                sess.messages.splice(idxErr, 1, { role: 'assistant', content: `❌ 请求失败: ${err.message}`, timestamp: getTimeLabel() });
            } else {
                sess.messages.push({ role: 'assistant', content: `❌ 出错: ${err.message}`, timestamp: getTimeLabel() });
            }
            renderMessagesThread();
            persistAll();
        } finally {
            isLoadingFlag = false;
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }
    
    // 发送控制
    async function onSend() {
        if (isLoadingFlag) return;
        const raw = userInput.value;
        if (!raw.trim()) return;
        userInput.value = '';
        await sendUserMessage(raw.trim());
    }
    
    // 监听回车
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !isLoadingFlag) {
            e.preventDefault();
            onSend();
        }
    });
    sendBtn.addEventListener('click', onSend);
    newSessionBtn.addEventListener('click', newEmptySession);
    clearChatBtn.addEventListener('click', clearCurrentSession);
    
    // 移动端侧边栏
    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        mobileOverlay.classList.toggle('open');
    });
    mobileOverlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        mobileOverlay.classList.remove('open');
    });
    
    // 初始化
    loadData();
    renderSidebar();
    renderMessagesThread();
    currentTitleSpan.innerText = sessions[currentSessionId]?.title || '对话';
</script>
</body>
</html>
