<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek · 完美多会话版</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: #1e293b;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            border-right: 1px solid #334155;
            z-index: 10;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
        }
        .new-session-btn {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .sync-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .session-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #334155;
        }
        .session-item.active {
            background: #3b82f6;
        }
        .session-title {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .delete-session-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
        }
        /* 主聊天区域 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        .cost-badge {
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #475569;
        }
        .session-actions {
            display: flex;
            gap: 8px;
        }
        .action-icon {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .user-wrapper {
            align-self: flex-end;
        }
        .ai-wrapper {
            align-self: flex-start;
        }
        .message {
            padding: 10px 16px;
            border-radius: 20px;
            line-height: 1.45;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .user-message {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            color: #0f172a;
        }
        .timestamp {
            font-size: 0.65rem;
            color: #94a3b8;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            background: white;
        }
        #user-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        #user-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        #send-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 5;
        }
        @media (max-width: 640px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 20;
                transform: translateX(-100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: block;
            }
            .message-wrapper { max-width: 90%; }
            .overlay.open {
                display: block;
            }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-session-btn" id="newSessionBtn">➕ 新建对话</button>
        <div class="sync-option">
            <input type="checkbox" id="syncToggle" checked>
            <label>跨设备同步（关闭后各设备独立保存）</label>
        </div>
    </div>
    <div class="sessions-list" id="sessionsList"></div>
</div>

<div class="main-chat">
    <div class="chat-header">
        <button class="menu-toggle" id="menuToggleBtn">☰</button>
        <h1 id="currentSessionTitle">新对话</h1>
        <div class="cost-badge" id="costBadge">💰 本次 0.0000 元</div>
        <div class="session-actions">
            <button class="action-icon" id="clearChatBtn" title="清空当前对话">🗑️</button>
        </div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入问题，AI将完整回复（无字数限制）" autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    // ======================== 请替换为你的真实 API Key ========================
    const DEEPSEEK_API_KEY = sk-57d321764a9f486daa8659be78886f3f;  // ⚠️ 修改这里！！！
    // =====================================================================

    // ---------- 配置 ----------
    const API_URL = 'https://api.deepseek.com/chat/completions';
    const MODEL = 'deepseek-v4-flash';
    const COOLDOWN_MS = 5000;          // 5秒冷却
    const DAILY_LIMIT = 50;            // 每天最多50次请求
    const INPUT_PRICE = 1.0;           // 元/百万token
    const OUTPUT_PRICE = 2.0;          // 元/百万token
    const MAX_CONTEXT_PAIRS = 8;       // 最多保留8轮对话作为上下文

    // ---------- 全局变量 ----------
    let sessions = {};                 // 存储所有会话 { sessionId: { id, title, messages, createdAt } }
    let currentSessionId = null;
    let currentSessionCost = 0;
    let lastCallTime = 0;
    let todayCallCount = 0;
    let loadingMessageDiv = null;      // 临时“思考中”元素

    // ---------- DOM 元素 ----------
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const sessionsListDiv = document.getElementById('sessionsList');
    const newSessionBtn = document.getElementById('newSessionBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const currentSessionTitleSpan = document.getElementById('currentSessionTitle');
    const costBadge = document.getElementById('costBadge');
    const syncToggle = document.getElementById('syncToggle');

    // ---------- 辅助函数 ----------
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function getCurrentTimeStr() {
        const d = new Date();
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function updateCostUI() {
        costBadge.innerText = `💰 本次 ${currentSessionCost.toFixed(5)} 元`;
    }

    // 粗略估算 token 数（用于费用预估，非精确）
    function estimateTokens(text) {
        const chinese = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
        const other = text.replace(/[\u4e00-\u9fa5]/g, '').length;
        return Math.ceil(chinese * 1.5 + other * 0.7);
    }

    // ---------- 存储管理 ----------
    function getStorageKey() {
        if (syncToggle.checked) {
            return 'deepseek_sessions_master_sync';
        } else {
            const device = navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop';
            return `deepseek_sessions_master_local_${device}`;
        }
    }

    function saveAllSessions() {
        const key = getStorageKey();
        const dataToSave = {
            sessions: sessions,
            currentId: currentSessionId
        };
        localStorage.setItem(key, JSON.stringify(dataToSave));
    }

    function loadAllSessions() {
        const key = getStorageKey();
        const raw = localStorage.getItem(key);
        if (raw) {
            try {
                const data = JSON.parse(raw);
                sessions = data.sessions || {};
                if (data.currentId && sessions[data.currentId]) {
                    currentSessionId = data.currentId;
                }
            } catch(e) { console.error(e); }
        }
        // 如果没有数据，创建一个默认会话
        if (Object.keys(sessions).length === 0) {
            const id = Date.now().toString();
            sessions[id] = {
                id: id,
                title: '新对话',
                messages: [{ role: 'assistant', content: '你好！我是 DeepSeek 助手，无输出上限。', timestamp: getCurrentTimeStr() }],
                createdAt: id
            };
            currentSessionId = id;
        } else if (!currentSessionId || !sessions[currentSessionId]) {
            currentSessionId = Object.keys(sessions)[0];
        }
        saveAllSessions();
    }

    // ---------- 渲染会话列表 ----------
    function renderSessionsList() {
        const sorted = Object.values(sessions).sort((a,b) => b.createdAt - a.createdAt);
        sessionsListDiv.innerHTML = '';
        for (let s of sorted) {
            const div = document.createElement('div');
            div.className = 'session-item';
            if (s.id === currentSessionId) div.classList.add('active');
            div.innerHTML = `<span class="session-title">${escapeHtml(s.title)}</span><button class="delete-session-btn" data-id="${s.id}">🗑️</button>`;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-session-btn')) return;
                switchToSession(s.id);
            });
            const delBtn = div.querySelector('.delete-session-btn');
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSession(s.id);
            });
            sessionsListDiv.appendChild(div);
        }
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ---------- 消息 UI 操作 ----------
    function addMessageToUI(content, role, timestamp, shouldSave = true) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${role === 'user' ? 'user-wrapper' : 'ai-wrapper'}`;
        const bubble = document.createElement('div');
        bubble.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
        bubble.innerText = content;
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        timeSpan.innerText = timestamp;
        wrapper.appendChild(bubble);
        wrapper.appendChild(timeSpan);
        messagesDiv.appendChild(wrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        if (shouldSave) {
            saveCurrentSessionFromDOM();
        }
    }

    // 将当前 DOM 中的消息同步到 sessions 对象
    function saveCurrentSessionFromDOM() {
        const session = sessions[currentSessionId];
        if (!session) return;
        const wrappers = document.querySelectorAll('#messages .message-wrapper');
        const msgs = [];
        for (let w of wrappers) {
            const bubble = w.querySelector('.message');
            const timeSpan = w.querySelector('.timestamp');
            if (bubble && timeSpan) {
                const role = bubble.classList.contains('user-message') ? 'user' : 'assistant';
                msgs.push({
                    role: role,
                    content: bubble.innerText,
                    timestamp: timeSpan.innerText
                });
            }
        }
        session.messages = msgs;
        // 更新标题
        const firstUser = msgs.find(m => m.role === 'user');
        if (firstUser) {
            let title = firstUser.content.slice(0, 20);
            if (firstUser.content.length > 20) title += '...';
            session.title = title;
        } else {
            session.title = '新对话';
        }
        saveAllSessions();
        renderSessionsList();
        currentSessionTitleSpan.innerText = session.title;
    }

    // 加载指定会话的消息到 DOM
    function loadSessionToDOM(sessionId) {
        const session = sessions[sessionId];
        if (!session) return;
        messagesDiv.innerHTML = '';
        for (let msg of session.messages) {
            addMessageToUI(msg.content, msg.role, msg.timestamp, false);
        }
    }

    // ---------- 会话操作 ----------
    function switchToSession(sessionId) {
        if (!sessions[sessionId]) return;
        // 保存当前会话状态
        saveCurrentSessionFromDOM();
        currentSessionId = sessionId;
        currentSessionCost = 0;
        updateCostUI();
        loadSessionToDOM(currentSessionId);
        currentSessionTitleSpan.innerText = sessions[currentSessionId].title;
        renderSessionsList();
        // 移动端关闭侧边栏
        if (window.innerWidth <= 640) {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        }
        saveAllSessions();
    }

    function deleteSession(sessionId) {
        if (Object.keys(sessions).length === 1) {
            showToast('至少保留一个对话');
            return;
        }
        delete sessions[sessionId];
        if (currentSessionId === sessionId) {
            currentSessionId = Object.keys(sessions)[0];
            loadSessionToDOM(currentSessionId);
            currentSessionCost = 0;
            updateCostUI();
            currentSessionTitleSpan.innerText = sessions[currentSessionId].title;
        }
        saveAllSessions();
        renderSessionsList();
    }

    function newSession() {
        saveCurrentSessionFromDOM();
        const id = Date.now().toString();
        sessions[id] = {
            id: id,
            title: '新对话',
            messages: [{ role: 'assistant', content: '你好！我是 DeepSeek 助手，无输出上限。', timestamp: getCurrentTimeStr() }],
            createdAt: id
        };
        currentSessionId = id;
        currentSessionCost = 0;
        updateCostUI();
        loadSessionToDOM(currentSessionId);
        currentSessionTitleSpan.innerText = '新对话';
        renderSessionsList();
        saveAllSessions();
    }

    function clearCurrentMessages() {
        if (!confirm('清空当前对话的所有消息？')) return;
        const session = sessions[currentSessionId];
        if (session) {
            session.messages = [{ role: 'assistant', content: '对话已清空，开始新话题吧。', timestamp: getCurrentTimeStr() }];
            loadSessionToDOM(currentSessionId);
            currentSessionCost = 0;
            updateCostUI();
            saveAllSessions();
            renderSessionsList();
        }
    }

    // ---------- 加载/隐藏“思考中” ----------
    function showLoading() {
        if (loadingMessageDiv) loadingMessageDiv.remove();
        loadingMessageDiv = document.createElement('div');
        loadingMessageDiv.className = 'message-wrapper ai-wrapper';
        const bubble = document.createElement('div');
        bubble.className = 'message ai-message';
        bubble.innerText = '🤔 思考中...';
        const timeSpan = document.createElement('div');
        timeSpan.className = 'timestamp';
        timeSpan.innerText = getCurrentTimeStr();
        loadingMessageDiv.appendChild(bubble);
        loadingMessageDiv.appendChild(timeSpan);
        messagesDiv.appendChild(loadingMessageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideLoading() {
        if (loadingMessageDiv) {
            loadingMessageDiv.remove();
            loadingMessageDiv = null;
        }
    }

    // ---------- API 调用（无输出上限）----------
    async function callDeepSeek(userQuestion) {
        // 冷却检查
        const now = Date.now();
        if (now - lastCallTime < COOLDOWN_MS) {
            const waitSec = Math.ceil((COOLDOWN_MS - (now - lastCallTime))/1000);
            throw new Error(`请等待 ${waitSec} 秒后再发送`);
        }
        // 每日次数检查
        const todayKey = `call_limit_${new Date().toISOString().slice(0,10)}`;
        let stored = localStorage.getItem(todayKey);
        todayCallCount = stored ? parseInt(stored,10) : 0;
        if (todayCallCount >= DAILY_LIMIT) {
            throw new Error(`今日已达最大调用次数 ${DAILY_LIMIT} 次，请明天再使用。`);
        }

        // 获取当前会话的历史（限制轮数）
        const session = sessions[currentSessionId];
        let history = [];
        if (session && session.messages) {
            let msgs = session.messages.slice(-MAX_CONTEXT_PAIRS*2);
            for (let m of msgs) {
                if (m.role !== 'system') {
                    history.push({ role: m.role, content: m.content });
                }
            }
        }
        const messagesPayload = [
            { role: 'system', content: '你是稳定的助手，请完整回答用户问题，不要截断回复。' },
            ...history
        ];

        // 预估费用
        const inputText = JSON.stringify(messagesPayload);
        const estInputTokens = estimateTokens(inputText);
        const estOutputGuess = 2000;  // 保守估计，实际可能更多
        const estCost = (estInputTokens / 1e6 * INPUT_PRICE) + (estOutputGuess / 1e6 * OUTPUT_PRICE);
        if (!confirm(`⚠️ 无输出上限提醒：预估费用约 ${estCost.toFixed(5)} 元（实际取决于AI回复长度）。\n确认发送？`)) {
            throw new Error('用户取消发送');
        }

        lastCallTime = Date.now();
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
            },
            body: JSON.stringify({
                model: MODEL,
                messages: messagesPayload,
                temperature: 0.7,
                stream: false
            })
        });

        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API错误(${response.status}): ${errText}`);
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;
        const usedTokens = data.usage?.completion_tokens || estimateTokens(reply);
        const actualCost = (estInputTokens / 1e6 * INPUT_PRICE) + (usedTokens / 1e6 * OUTPUT_PRICE);
        currentSessionCost += actualCost;
        updateCostUI();

        // 更新今日调用次数
        todayCallCount++;
        localStorage.setItem(todayKey, todayCallCount);
        return reply;
    }

    // ---------- 发送消息主流程 ----------
    async function handleSend() {
        const question = userInput.value.trim();
        if (!question) return;
        // 添加用户消息
        const userTime = getCurrentTimeStr();
        addMessageToUI(question, 'user', userTime, true);
        userInput.value = '';
        sendBtn.disabled = true;
        showLoading();
        try {
            const reply = await callDeepSeek(question);
            hideLoading();
            const aiTime = getCurrentTimeStr();
            addMessageToUI(reply, 'assistant', aiTime, true);
        } catch (err) {
            hideLoading();
            const errTime = getCurrentTimeStr();
            addMessageToUI(`❌ 调用失败: ${err.message}`, 'assistant', errTime, true);
            showToast(err.message);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // ---------- 初始化 & 事件绑定 ----------
    function init() {
        loadAllSessions();
        renderSessionsList();
        loadSessionToDOM(currentSessionId);
        currentSessionTitleSpan.innerText = sessions[currentSessionId].title;
        updateCostUI();

        // 每日调用次数恢复
        const todayKey = `call_limit_${new Date().toISOString().slice(0,10)}`;
        let stored = localStorage.getItem(todayKey);
        todayCallCount = stored ? parseInt(stored,10) : 0;
        showToast(`今日剩余调用次数：${DAILY_LIMIT - todayCallCount}`);

        // 绑定事件
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
        newSessionBtn.addEventListener('click', newSession);
        clearChatBtn.addEventListener('click', clearCurrentMessages);
        menuToggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        });
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        });
        syncToggle.addEventListener('change', () => {
            // 切换同步模式时，重新加载数据（会覆盖当前内存中的会话）
            if (confirm('切换同步模式将重新加载数据，未保存的当前会话会自动保存。是否继续？')) {
                saveCurrentSessionFromDOM();  // 先保存当前
                loadAllSessions();            // 重新加载新模式的存储
                renderSessionsList();
                loadSessionToDOM(currentSessionId);
                currentSessionTitleSpan.innerText = sessions[currentSessionId].title;
                currentSessionCost = 0;
                updateCostUI();
                showToast(syncToggle.checked ? '已切换到跨设备同步模式' : '已切换到本地独立模式');
            } else {
                // 用户取消，恢复开关状态
                syncToggle.checked = !syncToggle.checked;
            }
        });
    }

    // 启动
    init();
</script>
</body>
</html>
