<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek 测试版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 16px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            padding: 16px;
            margin: 0;
            border-bottom: 1px solid #e9ecef;
            background: white;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 24px;
            max-width: 85%;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #0f172a;
        }
        .loading {
            font-style: italic;
            color: #64748b;
            background: #f1f5f9;
        }
        .input-area {
            padding: 16px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 12px;
            background: white;
        }
        #user-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        #send-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <h1>🤖 DeepSeek 测试版</h1>
    <div id="messages">
        <div class="message ai-message">你好！我是 DeepSeek AI 助手，发送消息测试一下～</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." autocomplete="off">
        <button id="send-btn">发送</button>
    </div>
</div>

<script>
    // ==================== API Key 已替你填好 ====================
    const DEEPSEEK_API_KEY = 'sk-e6ef13c762094fc2aee6b7cc1643ca1d';
    const API_URL = 'https://api.deepseek.com/chat/completions';

    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // 对话历史（简化）
    let conversationHistory = [
        { role: "system", content: "You are a helpful assistant." }
    ];

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function addMessage(content, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
        messageDiv.textContent = content;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        return messageDiv;
    }

    let loadingDiv = null;
    function showLoading() {
        if (loadingDiv) loadingDiv.remove();
        loadingDiv = document.createElement('div');
        loadingDiv.classList.add('message', 'ai-message', 'loading');
        loadingDiv.textContent = '🤔 思考中...';
        messagesContainer.appendChild(loadingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function hideLoading() {
        if (loadingDiv) {
            loadingDiv.remove();
            loadingDiv = null;
        }
    }

    async function callDeepSeekAPI(userQuestion) {
        conversationHistory.push({ role: "user", content: userQuestion });

        const payload = {
            model: "deepseek-chat",
            messages: conversationHistory,
            stream: false,
            temperature: 0.7,
            max_tokens: 2000
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API 请求失败 (${response.status}): ${errorText}`);
            }

            const data = await response.json();
            const assistantReply = data.choices[0].message.content;
            conversationHistory.push({ role: "assistant", content: assistantReply });
            return assistantReply;

        } catch (error) {
            console.error('调用 DeepSeek 出错:', error);
            return `❌ 出错了: ${error.message}`;
        }
    }

    async function handleSend() {
        console.log("发送按钮被点击了"); // 控制台日志，用于调试
        const question = userInput.value.trim();
        if (!question) {
            showToast("请输入消息");
            return;
        }

        // 清空输入框
        userInput.value = '';
        // 显示用户消息
        addMessage(question, 'user');
        showLoading();
        sendBtn.disabled = true;
        userInput.disabled = true;

        const reply = await callDeepSeekAPI(question);

        hideLoading();
        addMessage(reply, 'ai');
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
    }

    // 显式绑定事件
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });

    console.log("页面加载完成，事件已绑定");
</script>
</body>
</html>
